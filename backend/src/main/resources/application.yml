server:
  port: 8080

spring:
  application:
    name: api
  datasource:
    url: jdbc:postgresql://localhost:5432/raisetimeline
    username: raisetimeline
    password: raisetimeline
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: raisetimeline-secret-key-must-be-at-least-32-characters-long
  access-expiration: 900000
  refresh-expiration: 604800000
