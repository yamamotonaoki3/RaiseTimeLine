server:
  port: 8080

spring:
  application:
    name: api
  datasource:
    url: jdbc:postgresql://localhost:5432/raisetimeline
    username: raisetimeline
    password: raisetimeline
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  web:
    resources:
      static-locations: classpath:/static/,file:./uploads/

app:
  upload:
    dir: uploads/avatars
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:raisetimeline-post-images}
    region: ${AWS_S3_REGION:ap-northeast-1}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/**/*.xml

jwt:
  secret: raisetimeline-secret-key-must-be-at-least-32-characters-long
  access-expiration: 900000
  refresh-expiration: 604800000
